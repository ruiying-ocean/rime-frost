    hilited_candidate_text_color: 0xFFFFFF
    hilited_candidate_label_color: 0xFFFFFF
    hilited_comment_text_color: 0x999999

  # App-specific ascii_mode
  # Find bundle identifier: osascript -e 'id of app "XX"'
  app_options:
    com.apple.Spotlight:
      ascii_mode: true
    com.runningwithcrayons.Alfred:
      ascii_mode: true
    com.apple.Terminal:
      ascii_mode: true
    com.microsoft.VSCode:
      ascii_mode: true
      ascii_punct: true
    com.jetbrains.intellij:
      ascii_mode: true
    org.gnu.Emacs:
      ascii_mode: true
    com.googlecode.iterm2:
      ascii_mode: true
