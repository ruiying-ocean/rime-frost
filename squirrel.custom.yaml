# Custom overrides for squirrel.yaml
# App-specific ascii_mode and color scheme preferences.
patch:
  # Color scheme
  style/color_scheme: wechat_light
  style/color_scheme_dark: wechat_dark
  style/candidate_list_layout: linear

  # Custom color schemes
  preset_color_schemes/wechat_light:
    name: "微信键盘浅色"
    horizontal: true
    back_color: 0xFFFFFF
    border_height: 0
    border_width: 8
    candidate_format: "%c %@ "
    comment_text_color: 0x999999
    corner_radius: 5
    hilited_corner_radius: 5
    font_face: PingFangSC
    font_point: 16
    hilited_candidate_back_color: 0x75B100
    hilited_candidate_text_color: 0xFFFFFF
    label_font_point: 12
    text_color: 0x424242
    inline_preedit: true

  preset_color_schemes/wechat_dark:
    name: "微信键盘深色"
    horizontal: true
    back_color: 0x2e2925
    border_height: 0
    border_width: 8
    candidate_format: "%c %@ "
    comment_text_color: 0x999999
    corner_radius: 5
    hilited_corner_radius: 5
    font_face: PingFangSC
    font_point: 16
    hilited_candidate_back_color: 0x75B100
    hilited_candidate_text_color: 0xFFFFFF
    label_font_point: 12
    text_color: 0x424242
    label_color: 0x999999
    candidate_text_color: 0xe9e9ea
    inline_preedit: true

  preset_color_schemes/mac_light:
    name: "Mac浅色"
    horizontal: true
    candidate_format: "%c %@ "
    corner_radius: 5
    hilited_corner_radius: 5
    line_spacing: 10
    border_height: 4
    border_width: 4
    font_face: PingFangSC
    font_point: 16
    label_font_point: 13
    text_color: 0x424242
    back_color: 0xFFFFFF
    border_color: 0xFFFFFF
    label_color: 0x999999
    candidate_text_color: 0x3c3c3c
    comment_text_color: 0x999999
    hilited_text_color: 0x999999
    hilited_back_color: 0xD75A00
    hilited_candidate_text_color: 0xFFFFFF
    hilited_candidate_label_color: 0xFFFFFF
    hilited_comment_text_color: 0x999999

  preset_color_schemes/mac_dark:
    name: "Mac深色"
    horizontal: true
    candidate_format: "%c %@ "
    corner_radius: 5
    hilited_corner_radius: 5
    line_spacing: 10
    border_height: 4
    border_width: 4
    font_face: PingFangSC
    font_point: 16
    label_font_point: 13
    text_color: 0x424242
    back_color: 0x252a2e
    border_color: 0x050505
    label_color: 0x999999
    candidate_text_color: 0xe9e9ea
    comment_text_color: 0x999999
    hilited_text_color: 0x999999
    hilited_back_color: 0xD75A00
    hilited_candidate_text_color: 0xFFFFFF
    hilited_candidate_label_color: 0xFFFFFF
    hilited_comment_text_color: 0x999999

  preset_color_schemes/mac_green:
    name: "Mac绿"
    horizontal: true
    candidate_format: "%c %@ "
    corner_radius: 5
    hilited_corner_radius: 5
    line_spacing: 10
    border_height: 4
    border_width: 4
    font_face: PingFangSC
    font_point: 16
    label_font_point: 13
    text_color: 0x424242
    back_color: 0xFFFFFF
    border_color: 0xFFFFFF
    label_color: 0x999999
    candidate_text_color: 0x3c3c3c
    comment_text_color: 0x999999
    hilited_text_color: 0x999999
    hilited_candidate_back_color: 0x32A14C
    hilited_candidate_text_color: 0xFFFFFF
